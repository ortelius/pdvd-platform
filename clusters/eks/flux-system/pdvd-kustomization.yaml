apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pdvd
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/eks/pdvd
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
  dependsOn:
    - name: flux-system
