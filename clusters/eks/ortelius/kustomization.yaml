apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: ortelius
  namespace: flux-system

resources:
  - helmrepository.yaml
  - helmrelease.yaml
  - secrets.enc.yaml           

configMapGenerator:
  - name: values
    namespace: flux-system
    files:
      - values.yaml

# Remove the secretGenerator block entirely
generatorOptions:
  disableNameSuffixHash: true